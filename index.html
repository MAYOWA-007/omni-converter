<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Omni Converter lets you drop a file, see useful output paths, tune the result, and convert through a focused visual workflow."
    />
    <link rel="icon" href="/omni-converter/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/omni-converter/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/omni-converter/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/omni-converter/apple-touch-icon.png" />
    <link rel="manifest" href="/omni-converter/site.webmanifest" />
    <meta name="theme-color" content="#090a0b" />
    <title>Omni Converter</title>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #0a0b0c;
        color: #fff7e8;
      }

      .prepaint-shell {
        position: relative;
        display: grid;
        min-height: 100dvh;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 46%, rgba(212, 170, 88, 0.16), transparent 17rem),
          #0a0b0c;
        font-family: Georgia, "Times New Roman", serif;
      }

      .prepaint-promise {
        position: fixed;
        top: 1.45rem;
        left: 50%;
        z-index: 20;
        margin: 0;
        color: #ffe2a0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1rem;
        line-height: 1;
        pointer-events: none;
        text-align: center;
        text-shadow: 0 0 16px rgba(243, 220, 157, 0.22);
        transform: translateX(-50%);
        white-space: nowrap;
        animation: prepaint-promise-fade 1200ms cubic-bezier(0.22, 1, 0.36, 1) 5200ms forwards;
      }

      @keyframes prepaint-promise-fade {
        to {
          opacity: 0;
          transform: translate(-50%, -14px);
          visibility: hidden;
        }
      }

      .prepaint-drop {
        display: inline-grid;
        min-width: 12.5rem;
        min-height: 3rem;
        place-items: center;
        border: 1px solid rgba(215, 183, 109, 0.5);
        background: rgba(9, 8, 8, 0.58);
        color: #fffaf0;
        font: 0.76rem/1 "SF Mono", Consolas, monospace;
        box-shadow: inset 0 1px 0 rgba(255, 250, 240, 0.14), 0 18px 54px rgba(0, 0, 0, 0.28);
      }
    </style>
  </head>
  <body>
    <p class="prepaint-promise" aria-hidden="true">Convert any file to any file.</p>
    <div id="root">
      <main class="prepaint-shell">
        <div class="prepaint-drop">Drop any file</div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
