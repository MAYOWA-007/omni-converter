<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; base-uri 'none'; form-action 'none'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self'; img-src 'self' data: blob:; font-src 'self'; media-src 'self' data: blob:; connect-src 'self' blob:; worker-src 'self' blob:; child-src 'self' blob:; frame-src 'self' blob:; object-src 'self' blob:; manifest-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <meta
      name="description"
      content="Omni Converter lets you drop a file, see useful output paths, tune the result, and convert through a focused visual workflow."
    />
    <link rel="icon" href="/omni-converter/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/omni-converter/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/omni-converter/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/omni-converter/apple-touch-icon.png" />
    <link rel="manifest" href="/omni-converter/site.webmanifest" />
    <link rel="stylesheet" href="/omni-converter/prepaint.css" />
    <link rel="stylesheet" href="/src/styles.css" />
    <link rel="preload" href="/omni-converter/assets/fonts/OmniDisplay.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/omni-converter/assets/fonts/OmniScript.woff2" as="font" type="font/woff2" crossorigin />
    <meta name="theme-color" content="#090a0b" />
    <title>Omni Converter</title>
  </head>
  <body>
    <p class="prepaint-promise" aria-hidden="true">Convert any file to any file</p>
    <div id="root">
      <main class="prepaint-shell">
        <div class="prepaint-drop">Drop any file</div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
